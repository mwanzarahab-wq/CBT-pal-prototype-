<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBT Pal — Prototype</title>
  
  <!-- Typography Imports -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- React & DOM Core CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Lucide Icons Development Script -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Global Page Reset & Smooth Animation Tweaks */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #F7F3EC;
      margin: 0;
      padding: 0;
    }
    
    /* Smooth shift animation for the top dawn gradient bar */
    @keyframes dawnshift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button {
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    button:active:not(:disabled) {
      transform: scale(0.98);
      filter: brightness(0.95);
    }
  </style>
</head>
<body>

  <!-- The single root node where React mounts our app layout -->
  <div id="root"></div>

  <!-- Main JavaScript Logic Sheet Connection -->
  <script src="app.js"></script>

</body>
</html>
